[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = ""

[[redirects]]
  from   = "/api/*"
  to     = "https://your-backend-url.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
